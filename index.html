<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.3.2/dist/peerjs.min.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-color: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --accent-color: #10b981;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
            position: relative;
        }

        .logo {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 8px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .upload-area {
            border: 2px dashed rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin-bottom: 24px;
        }

        .upload-area:hover, .upload-area:active {
            border-color: var(--primary-color);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-area.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .upload-btn-label {
            display: inline-block;
            padding: 12px 24px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .upload-btn-label:active {
            transform: scale(0.98);
        }

        #fileInput {
            width: 0.1px;
            height: 0.1px;
            opacity: 0;
            overflow: hidden;
            position: absolute;
            z-index: -1;
        }

        .progress-container {
            display: none;
            margin-top: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-gradient);
            border-radius: 3px;
            transition: width 0.1s ease;
        }

        .progress-status {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-card {
            display: none;
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            text-align: left;
            font-size: 14px;
            border: 1px solid transparent;
            animation: fadeIn 0.4s ease;
        }

        .status-card.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .status-card.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 16px;
            border: 1px solid var(--border-color);
            display: none;
        }

        /* Lucide Integration */
        .lucide {
            width: 1.2em;
            height: 1.2em;
            stroke-width: 2px;
            vertical-align: middle;
            display: inline-block;
        }

        .logo .lucide {
            width: 2.2rem;
            height: 2.2rem;
            stroke-width: 2.2px;
        }

        .upload-icon .lucide {
            width: 3.5rem;
            height: 3.5rem;
            stroke-width: 1.5px;
            color: var(--primary-color);
        }

        .status-title .lucide {
            margin-right: 8px;
            vertical-align: -0.12em;
        }

        .connection-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 15;
            color: var(--text-color);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-secondary);
            transition: background-color 0.3s;
        }

        .status-dot.connected {
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .status-dot.error {
            background-color: #EF4444;
            box-shadow: 0 0 8px #EF4444;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="connection-badge">
            <div class="status-dot" id="conn-status-dot"></div>
            <span id="conn-status-text">Waiting...</span>
        </div>

        <span class="logo"><i data-lucide="aperture"></i></span>
        <h1>Vision Scanner</h1>
        <p>Capture a picture of the machine bed or upload a document (Image/SVG) to process and send it to the Main UI.</p>

        <div class="upload-area" id="uploadArea">
            <span class="upload-icon"><i data-lucide="camera"></i></span>
            <span class="upload-btn-label">Capture or Upload</span>
        </div>
        <input type="file" id="fileInput" accept="image/*,.svg">

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-status" id="progressStatus">Initializing...</div>
        </div>

        <div class="status-card" id="statusCard">
            <div class="status-title" id="statusTitle">
                <span><i data-lucide="check-circle"></i></span> Sent Successfully!
            </div>
            <div id="statusMessage">Payload sent to Main UI.</div>
            <img class="preview-img" id="previewImg" src="" alt="Preview">
        </div>
    </div>

    <!-- Hidden canvas for image processing -->
    <canvas id="canvas" style="display:none;"></canvas>

    <!-- Local Libraries & Logic -->
    <script>lucide.createIcons();</script>
    <script src="lib/trace_skeleton.js"></script>
    <script src="Communication.js"></script>
    <script src="ImageProcessor.js?v=17"></script>
    <script src="app.js"></script>

</body>
</html>
